<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:1080px; height:1080px;
    font-family:'JetBrains Mono', monospace;
    background:#1A1A2E; overflow:hidden;
    position:relative; color:#FDFDFB;
  }
  .bg-image {
    position:absolute; inset:0;
    background-image:url('{{image_url}}');
    background-size:cover; background-position:center;
    z-index:0;
  }
  .overlay {
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(26,26,46,0.6) 0%, rgba(26,26,46,0.92) 100%);
    z-index:1;
  }
  .accent-bar { position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg, {{accent_color}}, #D89C08); z-index:3; }

  .wrapper {
    position:relative; z-index:2;
    width:100%; height:100%;
    display:flex; flex-direction:column;
  }

  .header { padding:22px 48px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .account { font-size:16px; font-weight:600; color:rgba(253,253,251,0.5); }
  .tag-right { font-size:16px; font-weight:600; color:{{accent_color}}; }
  .sep { height:1px; background:rgba(245,216,56,0.15); margin:0 48px; flex-shrink:0; }

  .content { flex:1; padding:48px; display:flex; flex-direction:column; justify-content:flex-end; }
  .headline { font-size:48px; font-weight:800; color:#FDFDFB; line-height:1.2; margin-bottom:28px; word-break:keep-all; }
  .section { margin-bottom:24px; }
  .section-badge {
    display:inline-flex; padding:6px 18px;
    background:rgba(245,216,56,0.15);
    border-radius:100px;
    font-size:14px; font-weight:700; color:{{accent_color}};
    letter-spacing:0.08em; text-transform:uppercase;
    margin-bottom:12px;
  }
  .section-body { font-size:24px; font-weight:400; color:rgba(253,253,251,0.7); line-height:1.6; word-break:keep-all; }

  .footer { padding:16px 48px; flex-shrink:0; display:flex; justify-content:flex-end; align-items:center; }
  .slide-num { font-size:13px; color:rgba(253,253,251,0.3); }
  .slide-current { color:{{accent_color}}; font-weight:600; }
</style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="overlay"></div>
  <div class="accent-bar"></div>

  <div class="wrapper">
    <div class="header">
      <span class="account">@{{account_name}}</span>
      <span class="tag-right">#Linux</span>
    </div>
    <div class="sep"></div>

    <div class="content">
      <h2 class="headline">{{headline}}</h2>
      <div class="section">
        <div class="section-badge">{{badge_text}}</div>
        <div class="section-body">{{body}}</div>
      </div>
      <div class="section">
        <div class="section-badge">{{badge2_text}}</div>
        <div class="section-body">{{body2}}</div>
      </div>
    </div>

    <div class="footer">
      <span class="slide-num"><span class="slide-current">{{slide_number}}</span> / {{total_slides}}</span>
    </div>
  </div>
</body>
</html>
