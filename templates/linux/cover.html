<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:1080px; height:1080px;
    font-family:'JetBrains Mono', monospace;
    background:#1A1A2E; overflow:hidden;
    display:flex; flex-direction:column;
    position:relative;
  }
  body::before {
    content:''; position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(245,216,56,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,216,56,0.02) 1px, transparent 1px);
    background-size:40px 40px;
    pointer-events:none; z-index:0;
  }
  .accent-bar { position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg, {{accent_color}}, #D89C08); z-index:3; }
  .glow-top { position:absolute; top:-150px; right:-80px; width:500px; height:500px; background:radial-gradient(circle, rgba(245,216,56,0.12) 0%, transparent 70%); pointer-events:none; z-index:0; }
  .glow-bottom { position:absolute; bottom:-120px; left:-80px; width:400px; height:400px; background:radial-gradient(circle, rgba(0,180,216,0.06) 0%, transparent 70%); pointer-events:none; z-index:0; }

  .content {
    position:relative; z-index:1;
    flex:1;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    padding:60px 72px 0;
  }
  .tux-icon { width:160px; height:auto; margin-bottom:36px; filter:drop-shadow(0 4px 32px rgba(245,216,56,0.2)); }
  .category-tag { display:inline-flex; align-items:center; gap:10px; margin-bottom:28px; }
  .category-dot { width:10px; height:10px; border-radius:50%; background:{{accent_color}}; }
  .category-text { font-size:18px; font-weight:700; color:{{accent_color}}; letter-spacing:0.15em; text-transform:uppercase; }
  .headline { font-size:72px; font-weight:800; color:#FDFDFB; letter-spacing:-0.03em; line-height:1.15; word-break:keep-all; margin-bottom:24px; }
  .divider { width:80px; height:3px; background:linear-gradient(90deg, {{accent_color}}, #D89C08); border-radius:2px; margin-bottom:20px; }
  .subtext { font-size:24px; font-weight:400; color:rgba(253,253,251,0.55); line-height:1.5; word-break:keep-all; }
  .pills { display:flex; gap:14px; margin-top:40px; flex-wrap:wrap; justify-content:center; }
  .pill {
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 22px;
    background:rgba(245,216,56,0.06);
    border:1px solid rgba(245,216,56,0.15);
    border-radius:100px;
    font-size:17px; font-weight:500;
    color:rgba(253,253,251,0.45);
  }
  .pill-dot { width:6px; height:6px; border-radius:50%; }
  .pill-dot--shell { background:#F5D838; }
  .pill-dot--kernel { background:#98C379; }
  .pill-dot--cli { background:#61AFEF; }
  .pill-dot--server { background:#C678DD; }

  .footer {
    position:relative; z-index:1;
    padding:0 72px 44px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .account { font-size:20px; color:rgba(253,253,251,0.3); }
  .slide-indicator { font-size:18px; color:rgba(253,253,251,0.2); }
  .slide-current { color:{{accent_color}}; font-weight:600; }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>

  <div class="content">
    <img class="tux-icon" src="https://upload.wikimedia.org/wikipedia/commons/3/35/Tux.svg" alt="Tux" onerror="this.style.display='none'">
    <div class="category-tag">
      <span class="category-dot"></span>
      <span class="category-text">Linux</span>
    </div>
    <h1 class="headline">{{headline}}</h1>
    <div class="divider"></div>
    <p class="subtext">{{subtext}}</p>
    <div class="pills">
      <span class="pill"><span class="pill-dot pill-dot--shell"></span>Shell</span>
      <span class="pill"><span class="pill-dot pill-dot--kernel"></span>Kernel</span>
      <span class="pill"><span class="pill-dot pill-dot--cli"></span>CLI</span>
      <span class="pill"><span class="pill-dot pill-dot--server"></span>Server</span>
    </div>
  </div>

  <div class="footer">
    <span class="account">@{{account_name}}</span>
    <span class="slide-indicator"><span class="slide-current">{{slide_number}}</span> / {{total_slides}}</span>
  </div>
</body>
</html>
