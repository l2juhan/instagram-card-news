<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:1080px; height:1080px;
    font-family:'JetBrains Mono', monospace;
    background:#1A1A2E; overflow:hidden;
    display:flex; flex-direction:column;
    position:relative; color:#FDFDFB;
  }
  body::before { content:''; position:absolute; inset:0; background-image:linear-gradient(rgba(245,216,56,0.02) 1px, transparent 1px),linear-gradient(90deg, rgba(245,216,56,0.02) 1px, transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
  .accent-bar { position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg, {{accent_color}}, #D89C08); z-index:3; }
  .glow-top { position:absolute; top:-150px; right:-80px; width:500px; height:500px; background:radial-gradient(circle, rgba(245,216,56,0.1) 0%, transparent 70%); pointer-events:none; z-index:0; }
  .glow-bottom { position:absolute; bottom:-120px; left:-80px; width:400px; height:400px; background:radial-gradient(circle, rgba(0,180,216,0.05) 0%, transparent 70%); pointer-events:none; z-index:0; }

  .header { position:relative; z-index:1; padding:22px 48px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .account { font-size:16px; font-weight:600; color:rgba(253,253,251,0.45); }
  .tag-right { font-size:16px; font-weight:600; color:{{accent_color}}; }
  .sep { height:1px; background:rgba(245,216,56,0.12); margin:0 48px; flex-shrink:0; }

  .content { position:relative; z-index:1; flex:1; padding:32px 48px 16px; display:flex; flex-direction:column; overflow:hidden; }
  .slide-label { font-size:16px; color:{{accent_color}}; letter-spacing:0.06em; margin-bottom:12px; opacity:0.8; }
  .headline { font-size:40px; font-weight:800; color:#FDFDFB; line-height:1.2; margin-bottom:24px; word-break:keep-all; }

  /* Terminal-style code block */
  .code-block {
    background:#0D1117;
    border-radius:12px;
    overflow:hidden;
    flex:1; min-height:0;
    margin-bottom:16px;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    display:flex; flex-direction:column;
    border:1px solid rgba(245,216,56,0.1);
  }
  .code-titlebar {
    background:#161B22;
    padding:10px 18px;
    display:flex; align-items:center; gap:8px;
    border-bottom:1px solid rgba(255,255,255,0.06);
    flex-shrink:0;
  }
  .dot { width:12px; height:12px; border-radius:50%; }
  .dot-red { background:#e06c75; }
  .dot-yellow { background:#d19a66; }
  .dot-green { background:#98c379; }
  .code-filename { font-size:13px; color:#636d83; margin-left:8px; }
  .code-body {
    padding:20px 24px;
    font-size:20px;
    line-height:1.7;
    color:#abb2bf;
    overflow:hidden;
    flex:1;
  }
  .code-body code { display:block; white-space:pre; }

  /* One Dark Pro syntax tokens */
  .t-kw { color:#c678dd; }
  .t-fn { color:#61afef; }
  .t-str { color:#98c379; }
  .t-num { color:#d19a66; }
  .t-cm { color:#5c6370; font-style:italic; }
  .t-var { color:#e06c75; }
  .t-op { color:#56b6c2; }
  .t-type { color:#e5c07b; }
  .t-plain { color:#abb2bf; }
  .t-prompt { color:#F5D838; font-weight:700; }

  .body-text { font-size:22px; font-weight:400; color:rgba(253,253,251,0.55); line-height:1.7; flex-shrink:0; word-break:keep-all; }

  .footer { position:relative; z-index:1; padding:16px 48px; flex-shrink:0; display:flex; justify-content:flex-end; align-items:center; }
  .slide-num { font-size:13px; color:rgba(253,253,251,0.25); }
  .slide-current { color:{{accent_color}}; font-weight:600; }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>

  <div class="header">
    <span class="account">@{{account_name}}</span>
    <span class="tag-right">#Linux</span>
  </div>
  <div class="sep"></div>

  <div class="content">
    <div class="slide-label">// Terminal</div>
    <div class="headline">{{headline}}</div>

    <div class="code-block">
      <div class="code-titlebar">
        <span class="dot dot-red"></span>
        <span class="dot dot-yellow"></span>
        <span class="dot dot-green"></span>
        <span class="code-filename">{{code_filename}}</span>
      </div>
      <div class="code-body">
        <code>{{code_body}}</code>
      </div>
    </div>

    <div class="body-text">{{body}}</div>
  </div>

  <div class="footer">
    <span class="slide-num"><span class="slide-current">{{slide_number}}</span> / {{total_slides}}</span>
  </div>
</body>
</html>
