<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>CS Content</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 1080px; height: 1080px; overflow: hidden; background: #FFFFFF; font-family: 'Noto Sans KR', sans-serif; }
    .card { width: 1080px; height: 1080px; background: #FFFFFF; display: flex; flex-direction: column; position: relative; }
    .browser-header { width: 100%; flex-shrink: 0; }
    .tab-bar { height: 40px; background: #DEDEDE; display: flex; align-items: flex-end; padding-left: 12px; }
    .traffic-lights { display: flex; align-items: center; gap: 8px; padding: 0 12px 11px 8px; flex-shrink: 0; }
    .dot { width: 14px; height: 14px; border-radius: 50%; }
    .dot-red { background: #FF5F57; }
    .dot-yellow { background: #FEBC2E; }
    .dot-green { background: #28C840; }
    .tab { display: flex; align-items: center; gap: 8px; background: #F8F8F8; border-radius: 8px 8px 0 0; padding: 0 14px; height: 32px; min-width: 200px; }
    .tab-title { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; font-size: 15px; color: #333; white-space: nowrap; flex: 1; }
    .tab-close { font-size: 15px; color: #999; flex-shrink: 0; line-height: 1; }
    .new-tab-btn { color: rgba(0,0,0,0.3); font-size: 22px; padding: 0 12px 6px 8px; line-height: 1; }
    .bookmark-bar { height: 28px; background: #F0F0F0; display: flex; align-items: center; padding: 0 12px; gap: 4px; border-bottom: 1px solid #E0E0E0; overflow: hidden; }
    .bm-grid { flex-shrink: 0; margin-right: 8px; }
    .bm-item { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; font-size: 13px; color: #555; white-space: nowrap; display: flex; align-items: center; gap: 4px; padding: 2px 6px; }
    .bm-icon { flex-shrink: 0; }

    .toolbar { height: 40px; background: #F8F8F8; display: flex; align-items: center; padding: 0 16px; gap: 10px; border-bottom: 1px solid #E0E0E0; }
    .nav-buttons { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .nav-btn { display: flex; align-items: center; justify-content: center; padding: 2px; }
    .address-bar { flex: 1; height: 30px; background: #FFFFFF; border-radius: 20px; display: flex; align-items: center; justify-content: center; padding: 0 10px; border: 1px solid #E0E0E0; }
    .toolbar-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; margin-left: 12px; }
    .address-star { flex-shrink: 0; margin-left: auto; padding-left: 8px; }
    .address-text { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; font-size: 15px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; text-align: center; }
    .main-content { flex: 1; display: flex; flex-direction: row; padding: 0; }
    .left-section { flex: 1; display: flex; flex-direction: column; }
    .header { padding: 48px 60px 0 80px; flex-shrink: 0; }
    .headline { font-size: 56px; font-weight: 900; color: #1D1D1F; line-height: 1.25; margin: 0; word-break: keep-all; }
    .body-section { flex: 1; padding: 40px 60px 40px 80px; display: flex; flex-direction: column; justify-content: center; }
    .accent-block { display: flex; align-items: stretch; }
    .accent-bar { width: 3px; background: {{accent_color}}; border-radius: 2px; flex-shrink: 0; margin-right: 32px; }
    .body-text { font-size: 28px; font-weight: 400; color: #424245; line-height: 1.75; word-break: keep-all; }
    .subtext { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 400; color: #AEAEB2; line-height: 1.6; margin-top: 36px; word-break: keep-all; }
    .right-section { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; padding: 40px 48px 40px 0; }
    .mini-diagram { display: flex; flex-direction: column; gap: 4px; }
    .mini-layer { padding: 12px 16px; font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 400; color: #999; border-left: 3px solid transparent; display: flex; align-items: center; gap: 8px; transition: all 0.2s; border-radius: 0 4px 4px 0; }
    .mini-layer .mini-num { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: #CCC; width: 24px; flex-shrink: 0; }
    .mini-layer .mini-name { white-space: nowrap; }
    .mini-layer.active { background: rgba(34,197,94,0.12); border-left: 3px solid {{accent_color}}; color: #1D1D1F; font-weight: 700; padding: 16px 16px; }
    .mini-layer.active .mini-num { color: {{accent_color}}; }
    .layer-7 { background: rgba(34,197,94,0.03); }
    .layer-6 { background: rgba(34,197,94,0.025); }
    .layer-5 { background: rgba(34,197,94,0.02); }
    .layer-4 { background: rgba(34,197,94,0.015); }
    .layer-3 { background: rgba(34,197,94,0.01); }
    .layer-2 { background: rgba(34,197,94,0.005); }
    .layer-1 { background: rgba(34,197,94,0.00); }
    .footer { padding: 0 60px 28px 60px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .account-name { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 400; color: #AEAEB2; }
  </style>
</head>
<body>
  <div class="card">
    <div class="browser-header">
      <div class="tab-bar">
        <div class="traffic-lights">
          <span class="dot dot-red"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
        </div>
        <div class="tab">
          
          <span class="tab-title">@cse_juhan02</span>
          <span class="tab-close">&times;</span>
        </div>
        <span class="new-tab-btn">+</span>
      </div>
      <div class="toolbar">
        <div class="nav-buttons">
          <span class="nav-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></span>
          <span class="nav-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg></span>
          <span class="nav-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6"/><path d="M21 13a9 9 0 11-2.2-8.4L21.5 8"/></svg></span>
        </div>
        <div class="address-bar">
          <span class="address-text" id="addressText">{{headline}}</span><svg class="address-star" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.09 6.26H21l-5.55 4.02L17.54 18.54 12 14.49l-5.54 4.05 2.09-6.26L3 8.26h6.91L12 2z"/></svg></div>
        <div class="toolbar-right">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#888"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
        </div>
      </div>

      <div class="bookmark-bar">
        <svg class="bm-grid" width="14" height="14" viewBox="0 0 16 16" fill="#999"><rect x="0" y="0" width="7" height="7" rx="1.5"/><rect x="9" y="0" width="7" height="7" rx="1.5"/><rect x="0" y="9" width="7" height="7" rx="1.5"/><rect x="9" y="9" width="7" height="7" rx="1.5"/></svg>
        <span class="bm-item"><svg class="bm-icon" width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="#888" stroke-width="1.3"><path d="M1.5 3.5a1.5 1.5 0 011.5-1.5h3.09a.5.5 0 01.35.15L7.85 3.56a.5.5 0 00.35.15H13a1.5 1.5 0 011.5 1.5v7.5a1.5 1.5 0 01-1.5 1.5H3a1.5 1.5 0 01-1.5-1.5V3.5z"/></svg>Network</span>
        <span class="bm-item"><svg class="bm-icon" width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="#888" stroke-width="1.3"><path d="M1.5 3.5a1.5 1.5 0 011.5-1.5h3.09a.5.5 0 01.35.15L7.85 3.56a.5.5 0 00.35.15H13a1.5 1.5 0 011.5 1.5v7.5a1.5 1.5 0 01-1.5 1.5H3a1.5 1.5 0 01-1.5-1.5V3.5z"/></svg>Algorithm</span>
        <span class="bm-item"><svg class="bm-icon" width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="#888" stroke-width="1.3"><path d="M1.5 3.5a1.5 1.5 0 011.5-1.5h3.09a.5.5 0 01.35.15L7.85 3.56a.5.5 0 00.35.15H13a1.5 1.5 0 011.5 1.5v7.5a1.5 1.5 0 01-1.5 1.5H3a1.5 1.5 0 01-1.5-1.5V3.5z"/></svg>OS</span>
        <span class="bm-item"><svg class="bm-icon" width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="#888" stroke-width="1.3"><path d="M1.5 3.5a1.5 1.5 0 011.5-1.5h3.09a.5.5 0 01.35.15L7.85 3.56a.5.5 0 00.35.15H13a1.5 1.5 0 011.5 1.5v7.5a1.5 1.5 0 01-1.5 1.5H3a1.5 1.5 0 01-1.5-1.5V3.5z"/></svg>Database</span>
        <span class="bm-item"><svg class="bm-icon" width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="#888" stroke-width="1.3"><path d="M1.5 3.5a1.5 1.5 0 011.5-1.5h3.09a.5.5 0 01.35.15L7.85 3.56a.5.5 0 00.35.15H13a1.5 1.5 0 011.5 1.5v7.5a1.5 1.5 0 01-1.5 1.5H3a1.5 1.5 0 01-1.5-1.5V3.5z"/></svg>Data Structure</span>
        <span class="bm-item"><svg class="bm-icon" width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="#888" stroke-width="1.3"><path d="M1.5 3.5a1.5 1.5 0 011.5-1.5h3.09a.5.5 0 01.35.15L7.85 3.56a.5.5 0 00.35.15H13a1.5 1.5 0 011.5 1.5v7.5a1.5 1.5 0 01-1.5 1.5H3a1.5 1.5 0 01-1.5-1.5V3.5z"/></svg>API</span>
        <span class="bm-item"><svg class="bm-icon" width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="#888" stroke-width="1.3"><path d="M1.5 3.5a1.5 1.5 0 011.5-1.5h3.09a.5.5 0 01.35.15L7.85 3.56a.5.5 0 00.35.15H13a1.5 1.5 0 011.5 1.5v7.5a1.5 1.5 0 01-1.5 1.5H3a1.5 1.5 0 01-1.5-1.5V3.5z"/></svg>Security</span>
        <span class="bm-item"><svg class="bm-icon" width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="#888" stroke-width="1.3"><path d="M1.5 3.5a1.5 1.5 0 011.5-1.5h3.09a.5.5 0 01.35.15L7.85 3.56a.5.5 0 00.35.15H13a1.5 1.5 0 011.5 1.5v7.5a1.5 1.5 0 01-1.5 1.5H3a1.5 1.5 0 01-1.5-1.5V3.5z"/></svg>Cloud</span>
      </div>
    </div>
    <div class="main-content">
      <div class="left-section">
        <div class="header">
          <h2 class="headline">{{headline}}</h2>
        </div>
        <div class="body-section">
          <div class="accent-block">
            <div class="accent-bar"></div>
            <p class="body-text">{{body}}</p>
          </div>
          <p class="subtext">{{subtext}}</p>
        </div>
      </div>
      <div class="right-section">
        <div class="mini-diagram">
          <div class="mini-layer layer-7" data-layer="7"><span class="mini-num">L7</span><span class="mini-name">응용</span></div>
          <div class="mini-layer layer-6" data-layer="6"><span class="mini-num">L6</span><span class="mini-name">표현</span></div>
          <div class="mini-layer layer-5" data-layer="5"><span class="mini-num">L5</span><span class="mini-name">세션</span></div>
          <div class="mini-layer layer-4" data-layer="4"><span class="mini-num">L4</span><span class="mini-name">전송</span></div>
          <div class="mini-layer layer-3" data-layer="3"><span class="mini-num">L3</span><span class="mini-name">네트워크</span></div>
          <div class="mini-layer layer-2" data-layer="2"><span class="mini-num">L2</span><span class="mini-name">데이터 링크</span></div>
          <div class="mini-layer layer-1" data-layer="1"><span class="mini-num">L1</span><span class="mini-name">물리</span></div>
        </div>
      </div>
    </div>
    <div class="footer">
      <span class="account-name">@{{account_name}}</span>
    </div>
  </div>
<script>
var a=document.getElementById('addressText');if(a)a.innerHTML=a.innerHTML.replace(/<br\s*\/?>/gi,' ');
var h=document.querySelector('.headline');if(h){var m=h.textContent.match(/L(\d)/);if(m){var n=m[1];document.querySelectorAll('.mini-layer').forEach(function(el){if(el.getAttribute('data-layer')===n)el.classList.add('active');});}}
</script>
</body>
</html>
