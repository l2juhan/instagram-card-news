<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'JetBrains Mono', monospace;
    background: #FFFFFF; overflow: hidden;
    display: flex; flex-direction: column;
    position: relative;
  }
  .accent-stripe { position:absolute; left:0; top:0; bottom:0; width:6px; background:{{accent_color}}; }
  .topbar { padding:28px 72px 22px 80px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .account { font-size:17px; font-weight:600; color:#4A5568; }
  .hashtags-top { font-size:17px; font-weight:600; color:{{accent_color}}; }
  .sep { height:1.5px; background:#E0F7FA; margin:0 72px 0 80px; flex-shrink:0; }

  .content { flex:1; padding:52px 72px 40px 80px; display:flex; flex-direction:column; justify-content:center; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: {{accent_color}};
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 100px;
    margin-bottom: 32px;
    width: fit-content;
    letter-spacing: 0.06em;
  }
  .badge::before { content: '#'; opacity: 0.7; }

  .headline {
    font-size: 72px;
    font-weight: 800;
    color: #1A202C;
    line-height: 1.15;
    margin-bottom: 32px;
    white-space: pre-line;
  }

  .divider { width:48px; height:3px; background:{{accent_color}}; border-radius:2px; margin-bottom:28px; }

  .body-text { font-size:24px; font-weight:400; color:#4A5568; line-height:1.75; flex:1; white-space:pre-line; }
  .subtext { font-size:18px; color:#A0AEC0; margin-top:20px; white-space:pre-line; }

  .sep-bottom { height:1.5px; background:#E0F7FA; margin:0 72px 0 80px; flex-shrink:0; }
  .footer { padding:18px 72px 18px 80px; display:flex; justify-content:flex-end; align-items:center; flex-shrink:0; }
  .slide-num { font-size:13px; color:#CBD5E0; }
</style>
</head>
<body>
  <div class="accent-stripe"></div>
  <div class="topbar">
    <span class="account">@{{account_name}}</span>
    <span class="hashtags-top">#ReactNative &nbsp; #TypeScript</span>
  </div>
  <div class="sep"></div>
  <div class="content">
    <div class="badge">{{badge_text}}</div>
    <div class="headline">{{headline}}</div>
    <div class="divider"></div>
    <div class="body-text">{{body}}</div>
    <div class="subtext">{{subtext}}</div>
  </div>
  <div class="sep-bottom"></div>
  <div class="footer">
    <span class="slide-num">{{slide_number}} / {{total_slides}}</span>
  </div>
</body>
</html>
