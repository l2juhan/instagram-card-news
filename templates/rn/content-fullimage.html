<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    position: relative;
  }
  .bg-image {
    position: absolute; inset: 0;
    background: #1A202C;
  }
  .bg-image img { width:100%; height:100%; object-fit:cover; }
  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.75) 100%);
  }

  .main {
    position: relative; z-index: 2;
    height: 100%;
    display: flex; flex-direction: column;
    padding: 60px 72px;
  }

  .top-row {
    display: flex; justify-content:space-between; align-items:center;
    margin-bottom: 40px;
  }
  .account { font-size:15px; color:rgba(255,255,255,0.5); }
  .slide-num-top { font-size:13px; color:rgba(255,255,255,0.3); }

  .headline {
    font-size: 56px; font-weight: 800;
    color: #FFFFFF; line-height: 1.2;
    margin-bottom: 40px;
    white-space: pre-line;
  }

  .spacer { flex: 1; }

  .sections { display: flex; flex-direction: column; gap: 20px; }
  .section-card {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 24px 28px;
    backdrop-filter: blur(8px);
  }
  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: {{accent_color}};
    color: #FFFFFF;
    font-size: 13px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 100px;
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }
  .section-body {
    font-size: 20px; font-weight: 400;
    color: rgba(255,255,255,0.85);
    line-height: 1.65;
    white-space: pre-line;
  }

  .bottom-row {
    margin-top: 28px;
    display: flex; justify-content:space-between; align-items:center;
  }
  .tags { display:flex; gap:10px; }
  .tag { font-size:13px; color:rgba(255,255,255,0.3); }
</style>
</head>
<body>
  <div class="bg-image">
    <img src="{{image_url}}" onerror="this.style.display='none'">
  </div>
  <div class="overlay"></div>

  <div class="main">
    <div class="top-row">
      <span class="account">@{{account_name}}</span>
      <span class="slide-num-top">{{slide_number}} / {{total_slides}}</span>
    </div>

    <div class="headline">{{headline}}</div>
    <div class="spacer"></div>

    <div class="sections">
      <div class="section-card">
        <div class="section-badge">{{badge_text}}</div>
        <div class="section-body">{{body}}</div>
      </div>
      <div class="section-card">
        <div class="section-badge">{{badge2_text}}</div>
        <div class="section-body">{{body2}}</div>
      </div>
    </div>

    <div class="bottom-row">
      <div class="tags">
        <span class="tag">#ReactNative</span>
        <span class="tag">#TypeScript</span>
      </div>
    </div>
  </div>
</body>
</html>
