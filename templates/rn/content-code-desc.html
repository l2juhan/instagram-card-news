<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'JetBrains Mono', monospace;
    background: #FFFFFF; overflow: hidden;
    display: flex; flex-direction: column;
    position: relative;
  }
  .accent-stripe { position:absolute; left:0; top:0; bottom:0; width:6px; background:{{accent_color}}; }

  .topbar { padding:24px 52px 20px 60px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .account { font-size:17px; font-weight:600; color:#4A5568; }
  .hashtags-top { font-size:17px; font-weight:600; color:{{accent_color}}; }
  .sep { height:1.5px; background:#E0F7FA; margin:0 52px 0 60px; flex-shrink:0; }

  .content { flex:1; padding:36px 52px 28px 60px; display:flex; flex-direction:column; overflow:hidden; }
  .slide-label { font-size:20px; color:{{accent_color}}; letter-spacing:0.06em; margin-bottom:14px; flex-shrink:0; }
  .headline { font-size:44px; font-weight:800; color:#1A202C; line-height:1.2; margin-bottom:26px; white-space:pre-line; flex-shrink:0; }

  .desc-box {
    background: #F0FDFE;
    border-left: 4px solid {{accent_color}};
    border-radius: 0 8px 8px 0;
    padding: 20px 24px;
    font-size: 24px;
    color: #4A5568;
    line-height: 2.0;
    white-space: pre-line;
    margin-bottom: 32px;
    flex-shrink: 0;
  }

  /* One Dark Pro Code Block */
  .code-block {
    background: #282c34;
    border-radius: 12px;
    overflow: hidden;
    flex: 1;
    min-height: 0;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
  }
  .code-titlebar {
    background: #21252b;
    padding: 10px 18px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .dot { width:12px; height:12px; border-radius:50%; }
  .dot-red   { background:#e06c75; }
  .dot-yellow{ background:#d19a66; }
  .dot-green { background:#98c379; }
  .code-filename { font-size:13px; color:#636d83; margin-left:8px; }
  .code-body {
    padding: 20px 24px;
    font-size: 19px;
    line-height: 1.7;
    color: #abb2bf;
    overflow: hidden;
    flex: 1;
  }
  .code-body code { display:block; white-space:pre; }

  /* One Dark Pro syntax tokens */
  .t-kw     { color:#c678dd; }
  .t-fn     { color:#61afef; }
  .t-str    { color:#98c379; }
  .t-num    { color:#d19a66; }
  .t-cm     { color:#5c6370; font-style:italic; }
  .t-var    { color:#e06c75; }
  .t-op     { color:#56b6c2; }
  .t-type   { color:#e5c07b; }
  .t-plain  { color:#abb2bf; }

  .body-text { font-size:22px; font-weight:400; color:#4A5568; line-height:1.9; flex-shrink:0; white-space:pre-line; }

  .sep-bottom { height:1.5px; background:#E0F7FA; margin:0 52px 0 60px; flex-shrink:0; }
  .footer { padding:16px 52px 16px 60px; display:flex; justify-content:flex-end; align-items:center; flex-shrink:0; }
  .slide-num { font-size:13px; color:#CBD5E0; }
</style>
</head>
<body>
  <div class="accent-stripe"></div>
  <div class="topbar">
    <span class="account">@{{account_name}}</span>
    <span class="hashtags-top">#ReactNative &nbsp; #TypeScript</span>
  </div>
  <div class="sep"></div>
  <div class="content">
    <div class="slide-label">// Code</div>
    <div class="headline">{{headline}}</div>
    <div class="desc-box">{{badge_text}}</div>
    <div class="code-block">
      <div class="code-titlebar">
        <span class="dot dot-red"></span>
        <span class="dot dot-yellow"></span>
        <span class="dot dot-green"></span>
        <span class="code-filename">{{code_filename}}</span>
      </div>
      <div class="code-body">
        <code>{{code_body}}</code>
      </div>
    </div>
    <div class="body-text">{{body}}</div>
  </div>
  <div class="sep-bottom"></div>
  <div class="footer">
    <span class="slide-num">{{slide_number}} / {{total_slides}}</span>
  </div>
</body>
</html>
