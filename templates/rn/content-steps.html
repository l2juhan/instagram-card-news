<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'JetBrains Mono', monospace;
    background: #FFFFFF; overflow: hidden;
    display: flex; flex-direction: column;
    position: relative;
  }
  .accent-stripe { position:absolute; left:0; top:0; bottom:0; width:6px; background:{{accent_color}}; }
  .topbar { padding:28px 72px 22px 80px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .account { font-size:17px; font-weight:600; color:#4A5568; }
  .hashtags-top { font-size:17px; font-weight:600; color:{{accent_color}}; }
  .sep { height:1.5px; background:#E0F7FA; margin:0 72px 0 80px; flex-shrink:0; }

  .content { flex:1; padding:48px 72px 36px 80px; display:flex; flex-direction:column; }
  .slide-label { font-size:20px; color:{{accent_color}}; letter-spacing:0.06em; margin-bottom:16px; }
  .headline { font-size:52px; font-weight:800; color:#1A202C; line-height:1.2; margin-bottom:44px; white-space:pre-line; }

  .steps { display:flex; flex-direction:column; gap:20px; flex:1; }
  .step {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    padding: 24px 28px;
    background: #F0FDFE;
    border-radius: 10px;
    border-left: 4px solid {{accent_color}};
  }
  .step-num {
    font-size: 13px;
    font-weight: 700;
    color: {{accent_color}};
    background: rgba(0,0,0,0.04);
    border: 1px solid {{accent_color}};
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    letter-spacing: 0;
  }
  .step-text { font-size:21px; font-weight:500; color:#2D3748; line-height:1.6; padding-top:4px; white-space:pre-line; }

  .connector {
    width: 2px; height: 12px;
    background: #E2E8F0;
    margin-left: calc(80px + 37px);
    align-self: stretch;
    display: none;
  }

  .body-note { font-size:19px; color:#A0AEC0; margin-top:20px; line-height:1.6; white-space:pre-line; }

  .sep-bottom { height:1.5px; background:#E0F7FA; margin:0 72px 0 80px; flex-shrink:0; }
  .footer { padding:18px 72px 18px 80px; display:flex; justify-content:flex-end; align-items:center; flex-shrink:0; }
  .slide-num { font-size:13px; color:#CBD5E0; }
</style>
</head>
<body>
  <div class="accent-stripe"></div>
  <div class="topbar">
    <span class="account">@{{account_name}}</span>
    <span class="hashtags-top">#ReactNative &nbsp; #TypeScript</span>
  </div>
  <div class="sep"></div>
  <div class="content">
    <div class="slide-label">// Process</div>
    <div class="headline">{{headline}}</div>
    <div class="steps">
      <div class="step">
        <div class="step-num">01</div>
        <div class="step-text">{{step1}}</div>
      </div>
      <div class="step">
        <div class="step-num">02</div>
        <div class="step-text">{{step2}}</div>
      </div>
      <div class="step">
        <div class="step-num">03</div>
        <div class="step-text">{{step3}}</div>
      </div>
    </div>
    <div class="body-note">{{body}}</div>
  </div>
  <div class="sep-bottom"></div>
  <div class="footer">
    <span class="slide-num">{{slide_number}} / {{total_slides}}</span>
  </div>
</body>
</html>
