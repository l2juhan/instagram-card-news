<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'JetBrains Mono', monospace;
    background: #FFFFFF; overflow: hidden;
    display: flex; flex-direction: column;
    position: relative;
  }
  .accent-stripe { position:absolute; left:0; top:0; bottom:0; width:6px; background:{{accent_color}}; }
  .topbar { padding:28px 72px 22px 80px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .account { font-size:17px; font-weight:600; color:#4A5568; }
  .hashtags-top { font-size:17px; font-weight:600; color:{{accent_color}}; }
  .sep { height:1.5px; background:#E0F7FA; margin:0 72px 0 80px; flex-shrink:0; }

  .content { flex:1; padding:48px 72px 36px 80px; display:flex; flex-direction:column; }
  .slide-label { font-size:20px; color:{{accent_color}}; letter-spacing:0.06em; margin-bottom:16px; }
  .headline { font-size:52px; font-weight:800; color:#1A202C; line-height:1.2; margin-bottom:40px; white-space:pre-line; }

  .split-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    flex: 1;
  }
  .split-col {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .col-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 6px 14px;
    border-radius: 4px;
    width: fit-content;
    margin-bottom: 4px;
  }
  .col-before .col-label { background: #FFF5F5; color: #E53E3E; border: 1px solid #FED7D7; }
  .col-after .col-label { background: #F0FFF4; color: #276749; border: 1px solid #C6F6D5; }
  .col-title {
    font-size: 26px;
    font-weight: 700;
    color: #1A202C;
    line-height: 1.3;
  }
  .col-before .col-title { color: #C53030; }
  .col-after .col-title { color: #276749; }

  .col-card {
    flex: 1;
    background: #F0FDFE;
    border-radius: 10px;
    padding: 24px;
    border-top: 3px solid #E2E8F0;
  }
  .col-before .col-card { border-top-color: #FC8181; }
  .col-after .col-card { border-top-color: #68D391; }

  .col-body { font-size:19px; font-weight:400; color:#4A5568; line-height:1.7; white-space:pre-line; }

  .v-divider {
    position: absolute;
    left: calc(80px + (1080px - 80px - 72px) / 2 + 12px);
    top: 200px;
    bottom: 100px;
    width: 1px;
    background: #E2E8F0;
  }

  .vs-badge {
    position: absolute;
    top: 50%;
    left: calc(80px + (1080px - 80px - 72px) / 2 + 12px);
    transform: translate(-50%, -50%);
    background: #FFFFFF;
    border: 2px solid {{accent_color}};
    color: {{accent_color}};
    font-size: 14px;
    font-weight: 800;
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
  }

  .subtext { font-size:17px; color:#A0AEC0; margin-top:16px; white-space:pre-line; }

  .sep-bottom { height:1.5px; background:#E0F7FA; margin:0 72px 0 80px; flex-shrink:0; }
  .footer { padding:18px 72px 18px 80px; display:flex; justify-content:flex-end; align-items:center; flex-shrink:0; }
  .slide-num { font-size:13px; color:#CBD5E0; }
</style>
</head>
<body>
  <div class="accent-stripe"></div>
  <div class="topbar">
    <span class="account">@{{account_name}}</span>
    <span class="hashtags-top">#ReactNative &nbsp; #TypeScript</span>
  </div>
  <div class="sep"></div>
  <div class="content">
    <div class="slide-label">// Compare</div>
    <div class="headline">{{headline}}</div>
    <div class="split-row" style="position:relative;">
      <div class="col-before split-col">
        <div class="col-label">BEFORE</div>
        <div class="col-title">{{left_title}}</div>
        <div class="col-card">
          <div class="col-body">{{left_body}}</div>
        </div>
      </div>
      <div class="col-after split-col">
        <div class="col-label">AFTER</div>
        <div class="col-title">{{right_title}}</div>
        <div class="col-card">
          <div class="col-body">{{right_body}}</div>
        </div>
      </div>
    </div>
    <div class="subtext">{{subtext}}</div>
  </div>
  <div class="sep-bottom"></div>
  <div class="footer">
    <span class="slide-num">{{slide_number}} / {{total_slides}}</span>
  </div>
</body>
</html>
