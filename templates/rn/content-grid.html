<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'JetBrains Mono', monospace;
    background: #FFFFFF; overflow: hidden;
    display: flex; flex-direction: column;
    position: relative;
  }
  .accent-stripe { position:absolute; left:0; top:0; bottom:0; width:6px; background:{{accent_color}}; }
  .topbar { padding:28px 72px 22px 80px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .account { font-size:17px; font-weight:600; color:#4A5568; }
  .hashtags-top { font-size:17px; font-weight:600; color:{{accent_color}}; }
  .sep { height:1.5px; background:#E0F7FA; margin:0 72px 0 80px; flex-shrink:0; }

  .content { flex:1; padding:48px 72px 36px 80px; display:flex; flex-direction:column; }
  .slide-label { font-size:20px; color:{{accent_color}}; letter-spacing:0.06em; margin-bottom:16px; }
  .headline { font-size:52px; font-weight:800; color:#1A202C; line-height:1.2; margin-bottom:40px; white-space:pre-line; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 20px;
    flex: 1;
  }
  .grid-card {
    background: #F0FDFE;
    border-radius: 12px;
    padding: 28px 24px;
    border: 1px solid #E0F7FA;
    border-top: 3px solid {{accent_color}};
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .grid-icon { font-size: 40px; line-height: 1; }
  .grid-title { font-size: 26px; font-weight: 700; color: #1A202C; }
  .grid-desc { font-size: 21px; color: #718096; line-height: 1.7; white-space: pre-line; }

  .sep-bottom { height:1.5px; background:#E0F7FA; margin:0 72px 0 80px; flex-shrink:0; }
  .footer { padding:18px 72px 18px 80px; display:flex; justify-content:flex-end; align-items:center; flex-shrink:0; }
  .slide-num { font-size:13px; color:#CBD5E0; }
</style>
</head>
<body>
  <div class="accent-stripe"></div>
  <div class="topbar">
    <span class="account">@{{account_name}}</span>
    <span class="hashtags-top">#ReactNative &nbsp; #TypeScript</span>
  </div>
  <div class="sep"></div>
  <div class="content">
    <div class="slide-label">// Overview</div>
    <div class="headline">{{headline}}</div>
    <div class="grid">
      <div class="grid-card">
        <div class="grid-icon">{{grid1_icon}}</div>
        <div class="grid-title">{{grid1_title}}</div>
        <div class="grid-desc">{{grid1_desc}}</div>
      </div>
      <div class="grid-card">
        <div class="grid-icon">{{grid2_icon}}</div>
        <div class="grid-title">{{grid2_title}}</div>
        <div class="grid-desc">{{grid2_desc}}</div>
      </div>
      <div class="grid-card">
        <div class="grid-icon">{{grid3_icon}}</div>
        <div class="grid-title">{{grid3_title}}</div>
        <div class="grid-desc">{{grid3_desc}}</div>
      </div>
      <div class="grid-card">
        <div class="grid-icon">{{grid4_icon}}</div>
        <div class="grid-title">{{grid4_title}}</div>
        <div class="grid-desc">{{grid4_desc}}</div>
      </div>
    </div>
  </div>
  <div class="sep-bottom"></div>
  <div class="footer">
    <span class="slide-num">{{slide_number}} / {{total_slides}}</span>
  </div>
</body>
</html>
