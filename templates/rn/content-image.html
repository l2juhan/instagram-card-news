<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'JetBrains Mono', monospace;
    background: #FFFFFF; overflow: hidden;
    display: flex; flex-direction: column;
    position: relative;
  }
  .accent-stripe { position:absolute; left:0; top:0; bottom:0; width:6px; background:{{accent_color}}; }
  .topbar { padding:28px 72px 22px 80px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .account { font-size:17px; font-weight:600; color:#4A5568; }
  .hashtags-top { font-size:17px; font-weight:600; color:{{accent_color}}; }
  .sep { height:1.5px; background:#E0F7FA; margin:0 72px 0 80px; flex-shrink:0; }

  .content { flex:1; padding:40px 72px 36px 80px; display:flex; flex-direction:column; }
  .slide-label { font-size:20px; color:{{accent_color}}; letter-spacing:0.06em; margin-bottom:14px; }
  .headline { font-size:48px; font-weight:800; color:#1A202C; line-height:1.2; margin-bottom:24px; white-space:pre-line; }

  .image-wrap {
    width: 100%;
    flex: 1;
    border-radius: 12px;
    overflow: hidden;
    background: #F8FFFE;
    border: 1.5px solid #E0F7FA;
    margin-bottom: 24px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .image-wrap img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
  .image-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction:column;
    align-items: center; justify-content: center;
    gap: 12px;
    color: #CBD5E0;
  }
  .placeholder-icon { font-size: 48px; opacity: 0.5; }
  .placeholder-text { font-size: 16px; }

  .body-text { font-size:24px; font-weight:400; color:#4A5568; line-height:1.9; flex-shrink:0; white-space:pre-line; }

  .sep-bottom { height:1.5px; background:#E0F7FA; margin:0 72px 0 80px; flex-shrink:0; }
  .footer { padding:18px 72px 18px 80px; display:flex; justify-content:flex-end; align-items:center; flex-shrink:0; }
  .slide-num { font-size:13px; color:#CBD5E0; }
</style>
</head>
<body>
  <div class="accent-stripe"></div>
  <div class="topbar">
    <span class="account">@{{account_name}}</span>
    <span class="hashtags-top">#ReactNative &nbsp; #TypeScript</span>
  </div>
  <div class="sep"></div>
  <div class="content">
    <div class="slide-label">// Visual</div>
    <div class="headline">{{headline}}</div>
    <div class="image-wrap">
      <img src="{{image_url}}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" style="display:block;">
      <div class="image-placeholder" style="display:none;">
        <div class="placeholder-icon">🖼</div>
        <div class="placeholder-text">image_url 을 입력하세요</div>
      </div>
    </div>
    <div class="body-text">{{body}}</div>
  </div>
  <div class="sep-bottom"></div>
  <div class="footer">
    <span class="slide-num">{{slide_number}} / {{total_slides}}</span>
  </div>
</body>
</html>
