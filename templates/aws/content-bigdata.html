<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; }

  .card {
    width: 1080px;
    height: 1350px;
    background: #232F3E;
    position: relative;
    overflow: hidden;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    word-break: keep-all;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .accent-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, {{accent_color}}, #ED7100);
    z-index: 2;
  }

  .glow-top-right {
    position: absolute;
    top: -200px;
    right: -100px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,153,0,0.12) 0%, transparent 70%);
    z-index: 0;
  }

  .glow-bottom-left {
    position: absolute;
    bottom: -150px;
    left: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(140,79,255,0.08) 0%, transparent 70%);
    z-index: 0;
  }

  .top-section {
    position: relative;
    z-index: 1;
    padding: 100px 72px 0;
    text-align: center;
  }

  .headline {
    font-size: 40px;
    font-weight: 400;
    color: rgba(255,255,255,0.7);
    line-height: 1.3;
  }

  .bigdata-section {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 72px;
  }

  .accent-line-top {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, {{accent_color}}, transparent);
    border-radius: 2px;
    margin-bottom: 48px;
  }

  .number-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 12px;
  }

  .bigdata-number {
    font-size: 150px;
    font-weight: 900;
    color: {{accent_color}};
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .bigdata-unit {
    font-size: 48px;
    font-weight: 600;
    color: {{accent_color}};
    line-height: 1;
  }

  .accent-line-bottom {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, transparent, {{accent_color}});
    border-radius: 2px;
    margin-top: 48px;
    margin-bottom: 48px;
  }

  .body-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 32px 40px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    text-align: center;
    max-width: 800px;
  }

  .body {
    font-size: 30px;
    font-weight: 400;
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
  }

  .subtext-section {
    position: relative;
    z-index: 1;
    padding: 32px 72px 0;
    text-align: center;
  }

  .subtext {
    font-size: 22px;
    font-weight: 400;
    color: rgba(255,255,255,0.4);
    line-height: 1.4;
  }

  .footer {
    position: relative;
    z-index: 1;
    padding: 0 72px 52px;
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
  }

  .account-name {
    font-size: 24px;
    color: rgba(255,255,255,0.35);
  }

  .slide-indicator {
    font-size: 22px;
    color: rgba(255,255,255,0.25);
  }

  .slide-current {
    color: {{accent_color}};
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="card">
  <div class="accent-bar"></div>
  <div class="glow-top-right"></div>
  <div class="glow-bottom-left"></div>

  <div class="top-section">
    <div class="headline">{{headline}}</div>
  </div>

  <div class="bigdata-section">
    <div class="accent-line-top"></div>
    <div class="number-row">
      <span class="bigdata-number">{{bigdata_number}}</span>
      <span class="bigdata-unit">{{bigdata_unit}}</span>
    </div>
    <div class="accent-line-bottom"></div>
    <div class="body-card">
      <div class="body">{{body}}</div>
    </div>
  </div>

  <div class="subtext-section">
    <div class="subtext">{{subtext}}</div>
  </div>

  <div class="footer">
    <span class="account-name">@{{account_name}}</span>
    <span class="slide-indicator"><span class="slide-current">{{slide_number}}</span> / {{total_slides}}</span>
  </div>
</div>
</body>
</html>
