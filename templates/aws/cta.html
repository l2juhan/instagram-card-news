<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .card {
    width: 1080px;
    height: 1350px;
    background: #232F3E;
    position: relative;
    overflow: hidden;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .accent-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, {{accent_color}}, #ED7100);
    z-index: 2;
  }

  .glow-top-right {
    position: absolute;
    top: -200px;
    right: -100px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,153,0,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .glow-bottom-left {
    position: absolute;
    bottom: -150px;
    left: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(140,79,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .header {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    padding: 52px 72px 0;
  }

  .aws-logo-icon {
    height: 40px;
    width: auto;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 72px;
    flex: 1;
    height: calc(100% - 160px);
  }

  .headline {
    font-size: 64px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: -0.025em;
    line-height: 1.25;
    word-break: keep-all;
    margin-bottom: 56px;
  }

  .cta-button {
    display: inline-block;
    padding: 20px 56px;
    background: {{accent_color}};
    color: #FFFFFF;
    font-size: 28px;
    font-weight: 700;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: -0.01em;
    word-break: keep-all;
    margin-bottom: 28px;
  }

  .subtext {
    font-size: 26px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    line-height: 1.5;
    word-break: keep-all;
  }

  .tag-pills {
    display: flex;
    gap: 14px;
    margin-top: 56px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .tag-pill {
    display: inline-flex;
    align-items: center;
    padding: 10px 24px;
    background: rgba(255,153,0,0.1);
    border: 1px solid rgba(255,153,0,0.25);
    border-radius: 100px;
    font-size: 22px;
    font-weight: 600;
    color: {{accent_color}};
    word-break: keep-all;
  }

  .footer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 72px 52px;
    z-index: 1;
  }

  .account-name {
    font-size: 24px;
    color: rgba(255,255,255,0.35);
    font-weight: 400;
  }

  .slide-indicator {
    font-size: 22px;
    color: rgba(255,255,255,0.25);
    font-weight: 400;
  }

  .slide-current {
    color: {{accent_color}};
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="card">
  <div class="accent-bar"></div>
  <div class="glow-top-right"></div>
  <div class="glow-bottom-left"></div>

  <div class="header">
    <svg class="aws-logo-icon" xmlns="http://www.w3.org/2000/svg" xml:space="preserve" viewBox="0 0 304 182"><path fill="#fff" d="m86 66 2 9c0 3 1 5 3 8v2l-1 3-7 4-2 1-3-1-4-5-3-6c-8 9-18 14-29 14-9 0-16-3-20-8-5-4-8-11-8-19s3-15 9-20c6-6 14-8 25-8a79 79 0 0 1 22 3v-7c0-8-2-13-5-16-3-4-8-5-16-5l-11 1a80 80 0 0 0-14 5h-2c-1 0-2-1-2-3v-5l1-3c0-1 1-2 3-2l12-5 16-2c12 0 20 3 26 8 5 6 8 14 8 25v32zM46 82l10-2c4-1 7-4 10-7l3-6 1-9v-4a84 84 0 0 0-19-2c-6 0-11 1-15 4-3 2-4 6-4 11s1 8 3 11c3 2 6 4 11 4zm80 10-4-1-2-3-23-78-1-4 2-2h10l4 1 2 4 17 66 15-66 2-4 4-1h8l4 1 2 4 16 67 17-67 2-4 4-1h9c2 0 3 1 3 2v2l-1 2-24 78-2 4-4 1h-9l-4-1-1-4-16-65-15 64-2 4-4 1h-9zm129 3a66 66 0 0 1-27-6l-3-3-1-2v-5c0-2 1-3 2-3h2l3 1a54 54 0 0 0 23 5c6 0 11-2 14-4 4-2 5-5 5-9l-2-7-10-5-15-5c-7-2-13-6-16-10a24 24 0 0 1 5-34l10-5a44 44 0 0 1 20-2 110 110 0 0 1 12 3l4 2 3 2 1 4v4c0 3-1 4-2 4l-4-2c-6-2-12-3-19-3-6 0-11 0-14 2s-4 5-4 9c0 3 1 5 3 7s5 4 11 6l14 4c7 3 12 6 15 10s5 9 5 14l-3 12-7 8c-3 3-7 5-11 6l-14 2z"/><path d="M274 144A220 220 0 0 1 4 124c-4-3-1-6 2-4a300 300 0 0 0 263 16c5-2 10 4 5 8z" fill="#f90"/><path d="M287 128c-4-5-28-3-38-1-4 0-4-3-1-5 19-13 50-9 53-5 4 5-1 36-18 51-3 2-6 1-5-2 5-10 13-33 9-38z" fill="#f90"/></svg>
  </div>

  <div class="content">
    <h1 class="headline">{{headline}}</h1>
    <div class="cta-button">{{cta_text}}</div>
    <p class="subtext">{{subtext}}</p>
    <div class="tag-pills">
      <span class="tag-pill">#{{tag1}}</span>
      <span class="tag-pill">#{{tag2}}</span>
      <span class="tag-pill">#{{tag3}}</span>
    </div>
  </div>

  <div class="footer">
    <span class="account-name">@{{account_name}}</span>
    <span class="slide-indicator"><span class="slide-current">{{slide_number}}</span> / {{total_slides}}</span>
  </div>
</div>
</body>
</html>
