<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .card {
    width: 1080px;
    height: 1350px;
    background: #232F3E;
    position: relative;
    overflow: hidden;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .accent-bar {
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, {{accent_color}}, #ED7100);
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }

  .glow-top-right {
    position: absolute;
    top: -200px;
    right: -100px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,153,0,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .glow-bottom-left {
    position: absolute;
    bottom: -150px;
    left: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(140,79,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 72px;
    padding-bottom: 0;
  }

  .headline {
    font-size: 52px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: -0.025em;
    word-break: keep-all;
    text-align: center;
    margin-bottom: 56px;
  }

  .split-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    position: relative;
  }

  .column-card {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 36px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-height: 320px;
  }

  .column-title-left {
    font-size: 32px;
    font-weight: 700;
    color: {{accent_color}};
    word-break: keep-all;
  }

  .column-title-right {
    font-size: 32px;
    font-weight: 700;
    color: #8C4FFF;
    word-break: keep-all;
  }

  .column-body {
    font-size: 26px;
    color: rgba(255,255,255,0.7);
    font-weight: 400;
    line-height: 1.7;
    word-break: keep-all;
  }

  .divider-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 60px;
    position: relative;
    z-index: 2;
  }

  .divider-line {
    width: 2px;
    flex: 1;
    background: rgba(255,255,255,0.1);
  }

  .vs-circle {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    background: #232F3E;
    color: rgba(255,255,255,0.5);
    font-size: 18px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .subtext {
    font-size: 24px;
    color: rgba(255,255,255,0.4);
    font-weight: 400;
    text-align: center;
    margin-top: 40px;
    word-break: keep-all;
  }

  .footer {
    position: relative;
    z-index: 1;
    padding: 0 72px 52px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .account-name {
    font-size: 24px;
    color: rgba(255,255,255,0.35);
    font-weight: 400;
  }

  .slide-indicator {
    font-size: 24px;
    color: rgba(255,255,255,0.35);
    font-weight: 400;
  }

  .slide-current {
    color: {{accent_color}};
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="card">
  <div class="accent-bar"></div>
  <div class="glow-top-right"></div>
  <div class="glow-bottom-left"></div>

  <div class="content">
    <h1 class="headline">{{headline}}</h1>

    <div class="split-area">
      <div class="column-card">
        <div class="column-title-left">{{left_title}}</div>
        <div class="column-body">{{left_body}}</div>
      </div>

      <div class="divider-area">
        <div class="divider-line"></div>
        <div class="vs-circle">VS</div>
        <div class="divider-line"></div>
      </div>

      <div class="column-card">
        <div class="column-title-right">{{right_title}}</div>
        <div class="column-body">{{right_body}}</div>
      </div>
    </div>

    <div class="subtext">{{subtext}}</div>
  </div>

  <div class="footer">
    <span class="account-name">@{{account_name}}</span>
    <span class="slide-indicator"><span class="slide-current">{{slide_number}}</span> / {{total_slides}}</span>
  </div>
</div>
</body>
</html>
