<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; }

  .card {
    width: 1080px;
    height: 1350px;
    background: #232F3E;
    position: relative;
    overflow: hidden;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    word-break: keep-all;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .accent-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, {{accent_color}}, #ED7100);
    z-index: 2;
  }

  .glow-top-right {
    position: absolute;
    top: -200px;
    right: -100px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,153,0,0.12) 0%, transparent 70%);
    z-index: 0;
  }

  .glow-bottom-left {
    position: absolute;
    bottom: -150px;
    left: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(140,79,255,0.08) 0%, transparent 70%);
    z-index: 0;
  }

  .image-area {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 55%;
    background-color: rgba(255,255,255,0.04);
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .image-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 50%, #232F3E 100%);
    z-index: 1;
  }

  .placeholder-icon {
    z-index: 0;
  }

  .text-section {
    position: relative;
    z-index: 1;
    flex: 1;
    padding: 32px 72px 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .headline {
    font-size: 48px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: -0.025em;
    line-height: 1.25;
    margin-bottom: 24px;
  }

  .body {
    font-size: 28px;
    font-weight: 400;
    color: rgba(255,255,255,0.7);
    line-height: 1.7;
  }

  .footer {
    position: relative;
    z-index: 1;
    padding: 0 72px 52px;
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
  }

  .account-name {
    font-size: 24px;
    color: rgba(255,255,255,0.35);
  }

  .slide-indicator {
    font-size: 22px;
    color: rgba(255,255,255,0.25);
  }

  .slide-current {
    color: {{accent_color}};
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="card">
  <div class="accent-bar"></div>
  <div class="glow-top-right"></div>
  <div class="glow-bottom-left"></div>

  <div class="image-area" style="background-image: url('{{image_url}}');">
    <div class="image-overlay"></div>
  </div>

  <div class="text-section">
    <div class="headline">{{headline}}</div>
    <div class="body">{{body}}</div>
  </div>

  <div class="footer">
    <span class="account-name">@{{account_name}}</span>
    <span class="slide-indicator"><span class="slide-current">{{slide_number}}</span> / {{total_slides}}</span>
  </div>
</div>
</body>
</html>
